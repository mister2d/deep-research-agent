api:
  openai_base_url: http://localhost:8080/v1
  openai_model: local-model
settings:
  enable_thinking: false
  concurrency:
    max_concurrent_tasks: 3
  quotas:
    # IMPORTANT: Quotas are GLOBAL (shared across ALL agents in the system).
    # Each key MUST be unique — duplicate YAML keys silently overwrite earlier ones!
    # The engine auto-injects these as prompt format variables: {key_quota}
    # e.g. "web_search: 10" becomes {web_search_quota} = 10 in your prompts.
    # Both flat integers and dict-with-limit are supported.
    delegate_tasks: 20
    web_search: 10
    fetch_url_to_workspace: 20
    write_workspace_file: 20
    write_todos: 30
    read_todos: 30
    think_tool: 30
    read_workspace_file:
      limit: 60
      rules:
        max_lines: 400
    grep_workspace_file:
      limit: 60
      rules:
        max_matches: 15
    list_workspace_files: 20
  # web_search: tune the hybrid-web-search pipeline (SearXNG → BM25 → Crawl4AI →
  # chunk ranking). Each value here is exported to the search subprocess as a
  # HYBRID_SEARCH_* env var and OVERRIDES the ambient environment. The values
  # below are DEEP-RESEARCH-grade defaults (crawl more sources, keep more/
  # lower-scored chunks, longer budget). Remove a key — or the whole section —
  # to fall back to the skill's own SCOUT-grade defaults (max_crawl_urls: 3,
  # max_output_chunks: 5, crawl_score_threshold: 0.5, chunk_token_target: 512,
  # timeout_ms: 8000), which suit quick interactive lookups.
  web_search:
    max_crawl_urls: 5           # HYBRID_SEARCH_MAX_CRAWL_URLS — pages to fully crawl
    max_output_chunks: 8        # HYBRID_SEARCH_MAX_OUTPUT_CHUNKS — ranked chunks returned
    chunk_token_target: 512     # HYBRID_SEARCH_CHUNK_TOKEN_TARGET — approx tokens per chunk
    crawl_score_threshold: 0.0  # HYBRID_SEARCH_CRAWL_SCORE_THRESHOLD — min score to crawl (0.0 = crawl all)
    timeout_ms: 20000           # HYBRID_SEARCH_TIMEOUT_MS — per-request crawl budget
  enable_conversational_memory: true
  enable_session_persistence: true
  workspace:
    type: disk
    dir: "~/.{APP_NAME}/workspace"
    session_isolation: true  # Auto-creates timestamped run folders (e.g. run_1748192400/)
    required_artifact: "final_report.md"
